# ─────────────────────────────────────────────────────────────────
# GitHub Actions: OTA Release
#
# Tetiklenme: "v*" tag'ı push edildiğinde (örn. v3.6.0)
# Yapılan: ota/firmware.bin'i GitHub Release'a otomatik yükler
# ─────────────────────────────────────────────────────────────────
name: OTA Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify firmware.bin exists
        run: |
          if [ ! -f ota/firmware.bin ]; then
            echo "::error::ota/firmware.bin bulunamadı! Önce build_ota.sh çalıştırın."
            exit 1
          fi
          ls -lh ota/firmware.bin
          echo "Firmware size: $(stat -c%s ota/firmware.bin 2>/dev/null || stat -f%z ota/firmware.bin) bytes"

      - name: Verify version.json matches tag
        run: |
          JSON_VER=$(python3 -c "import json; print(json.load(open('ota/version.json'))['version'])")
          TAG_VER="${{ steps.version.outputs.VERSION }}"
          echo "version.json: $JSON_VER"
          echo "Git tag:      $TAG_VER"
          if [ "$JSON_VER" != "$TAG_VER" ]; then
            echo "::error::version.json ($JSON_VER) ile tag ($TAG_VER) uyuşmuyor!"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TouchSync Panel Firmware v${{ steps.version.outputs.VERSION }}"
          body: |
            ## TouchSync Panel Firmware v${{ steps.version.outputs.VERSION }}

            ### OTA Güncelleme
            ESP32 cihazınız bu firmware'i otomatik olarak indirebilir.
            Settings → Firmware Update (OTA) → Kontrol Et

            ### Manuel İndirme
            `firmware.bin` dosyasını aşağıdan indirip USB ile flash edebilirsiniz:
            ```
            esptool.py --chip esp32s3 write_flash 0x20000 firmware.bin
            ```
          files: |
            ota/firmware.bin
          draft: false
          prerelease: false
